<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabuada Turbo - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e17;
      --card: #1a1830;
      --accent: #ff6b35;
      --accent2: #ffd700;
      --accent3: #00e5ff;
      --green: #39ff14;
      --red: #ff3366;
      --text: #fff;
      --muted: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .admin-header { background: var(--card); padding: 20px; text-align: center; border-bottom: 2px solid var(--accent); }
    .admin-header h1 { font-family: 'Boogaloo', cursive; color: var(--accent); font-size: 2rem; }
    .admin-header span { color: var(--accent2); }
    
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    
    .login-box { max-width: 400px; margin: 100px auto; text-align: center; background: var(--card); padding: 40px; border-radius: 16px; }
    .login-box h2 { margin-bottom: 20px; font-family: 'Boogaloo', cursive; }
    .login-box input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 2px solid #333; background: #111; color: #fff; font-size: 1rem; }
    .login-box button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
    .login-box button:hover { background: #ff8555; }
    .error { color: var(--red); margin-top: 10px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
    .stat-card { background: var(--card); padding: 24px; border-radius: 12px; text-align: center; }
    .stat-card .num { font-family: 'Boogaloo', cursive; font-size: 2.5rem; color: var(--accent2); }
    .stat-card .label { color: var(--muted); font-size: 0.9rem; text-transform: uppercase; }
    
    .section { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .section h2 { font-family: 'Boogaloo', cursive; color: var(--accent3); margin-bottom: 16px; }
    
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; }
    .role-admin { color: var(--accent2); font-weight: 700; }
    .role-cliente { color: var(--muted); }
    .confirmado { color: var(--green); }
    .nao-confirmado { color: var(--red); }
    
    .btn-logout { background: var(--red); padding: 10px 20px; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 0.9rem; }
    
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="admin-header">
    <h1>Tabuada Turbo <span>Admin</span></h1>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>

  <div class="container">
    <!-- Login -->
    <div id="login-screen" class="login-box">
      <h2>🔑 Login Admin</h2>
      <input type="email" id="email" placeholder="Email" value="admin@tabuadaturbo.com.br">
      <input type="password" id="senha" placeholder="Senha" value="admin123">
      <button onclick="login()">Entrar</button>
      <p class="error" id="login-error"></p>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="num" id="total-usuarios">-</div>
          <div class="label">Usuários</div>
        </div>
        <div class="stat-card">
          <div class="num" id="usuarios-confirmados">-</div>
          <div class="label">Confirmados</div>
        </div>
        <div class="stat-card">
          <div class="num" id="total-jogos">-</div>
          <div class="label">Jogos</div>
        </div>
      </div>

      <div class="section">
        <h2>👥 Lista de Usuários</h2>
        <table id="usuarios-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Role</th>
              <th>Confirmado</th>
              <th>Criado em</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section">
        <h2>🏆 Melhores (Nível 1)</h2>
        <table id="ranking-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Tempo</th>
              <th>Acertos</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section">
        <h2>⚙️ Editar Admin</h2>
        <div style="display: grid; gap: 12px; max-width: 400px;">
          <input type="text" id="edit-nome" placeholder="Nome" style="padding: 12px; border-radius: 8px; background: #111; color: #fff; border: 1px solid #333;">
          <input type="email" id="edit-email" placeholder="Email" style="padding: 12px; border-radius: 8px; background: #111; color: #fff; border: 1px solid #333;" readonly>
          <input type="password" id="edit-senha" placeholder="Nova senha (ou vazio para manter)" style="padding: 12px; border-radius: 8px; background: #111; color: #fff; border: 1px solid #333;">
          <button onclick="salvarAdmin()" style="padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #fff; cursor: pointer;">💾 Salvar Alterações</button>
          <p id="edit-msg" style="text-align: center;"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://backend-nept.onrender.com/api';
    let token = localStorage.getItem('admin_token');

    if (token) {
      showDashboard();
    }

    async function login() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const errorEl = document.getElementById('login-error');

      try {
        const res = await fetch(API_URL + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        
        if (!res.ok) {
          errorEl.textContent = data.message || 'Erro ao fazer login';
          return;
        }

        if (data.usuario.role !== 'admin') {
          errorEl.textContent = 'Acesso restrito a administradores';
          return;
        }

        token = data.token;
        localStorage.setItem('admin_token', token);
        showDashboard();
      } catch (e) {
        errorEl.textContent = 'Erro de conexão';
      }
    }

    function logout() {
      localStorage.removeItem('admin_token');
      location.reload();
    }

    async function showDashboard() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      
      // Carregar dados do admin logado
      const resPerfil = await fetch(API_URL + '/auth/perfil', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const perfil = await resPerfil.json();
      popularDadosAdmin(perfil.usuario);
      
      await loadEstatisticas();
      await loadUsuarios();
      await loadRanking();
    }

    async function loadEstatisticas() {
      const res = await fetch(API_URL + '/admin/estatisticas', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      
      document.getElementById('total-usuarios').textContent = data.totalUsuarios;
      document.getElementById('usuarios-confirmados').textContent = data.usuariosConfirmados;
      document.getElementById('total-jogos').textContent = data.totalJogos;
    }

    async function loadUsuarios() {
      const res = await fetch(API_URL + '/admin/usuarios', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      
      const tbody = document.querySelector('#usuarios-table tbody');
      tbody.innerHTML = data.usuarios.map(u => `
        <tr>
          <td>${u.nome}</td>
          <td>${u.email}</td>
          <td class="${u.role === 'admin' ? 'role-admin' : 'role-cliente'}">${u.role}</td>
          <td class="${u.confirmado ? 'confirmado' : 'nao-confirmado'}">${u.confirmado ? '✅' : '❌'}</td>
          <td>${new Date(u.criado_em).toLocaleDateString('pt-BR')}</td>
        </tr>
      `).join('');
    }

    async function loadRanking() {
      const res = await fetch(API_URL + '/ranking/nivel/1');
      const data = await res.json();
      
      const tbody = document.querySelector('#ranking-table tbody');
      tbody.innerHTML = data.ranking.slice(0, 10).map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${r.nome}</td>
          <td>${r.tempo}s</td>
          <td>${r.acertos}</td>
        </tr>
      `).join('');
    }

    async function salvarAdmin() {
      const nome = document.getElementById('edit-nome').value;
      const senha = document.getElementById('edit-senha').value;
      const msgEl = document.getElementById('edit-msg');
      
      const body = { nome };
      if (senha) body.senha = senha;
      
      try {
        const res = await fetch(API_URL + '/admin/usuarios/254132cd-0383-46e6-9328-b282b4d6b96f', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(body)
        });
        
        if (res.ok) {
          msgEl.textContent = '✅Salvo com sucesso!';
          msgEl.style.color = 'var(--green)';
        } else {
          msgEl.textContent = '❌Erro ao salvar';
          msgEl.style.color = 'var(--red)';
        }
      } catch (e) {
        msgEl.textContent = '❌Erro de conexão';
        msgEl.style.color = 'var(--red)';
      }
    }

    function popularDadosAdmin(usuario) {
      document.getElementById('edit-nome').value = usuario.nome;
      document.getElementById('edit-email').value = usuario.email;
    }
  </script>
</body>
</html>
